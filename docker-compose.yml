services:
  app:
    build: .
    container_name: coursehub_app
    restart: unless-stopped
    env_file: [ .env ]
    volumes:
      - .:/var/www/html
    networks:
      - coursehub_net
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: .
    container_name: coursehub_worker
    restart: unless-stopped
    command: php artisan queue:work --queue=high,default --tries=3 --timeout=90
    env_file: [ .env ]
    volumes:
      - .:/var/www/html
    networks:
      - coursehub_net
    depends_on:
      redis: { condition: service_healthy }

  scheduler:
    build: .
    container_name: coursehub_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    env_file: [ .env ]
    volumes:
      - .:/var/www/html
    networks:
      - coursehub_net
    depends_on:
      mysql: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    container_name: coursehub_nginx
    ports: [ "80:80" ]
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - coursehub_net
    depends_on: [ app ]

  mysql:
    image: mysql:8.0
    container_name: coursehub_mysql
    restart: unless-stopped
    env_file: .env
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - coursehub_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: coursehub_redis
    networks:
      - coursehub_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 5

networks:
  coursehub_net:
    driver: bridge

volumes:
  mysql_data:
