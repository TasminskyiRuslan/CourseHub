services:
  app:
    build: .
    container_name: coursehub_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www/html
    ports:
      - "${APP_PORT}:8000"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: coursehub_mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: coursehub_redis
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  mysql_data:
