services:
  app:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: coursehub-php:dev
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/var/www/html:delegated
    networks:
      - coursehub_net
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    image: coursehub-php:dev
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    command: php artisan queue:work --queue=high,default --tries=3 --timeout=90
    env_file: .env
    volumes:
      - .:/var/www/html:delegated
    networks:
      - coursehub_net
    depends_on:
      app: { condition: service_started }

  scheduler:
    image: coursehub-php:dev
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    command: php artisan schedule:work
    env_file: .env
    volumes:
      - .:/var/www/html:delegated
    networks:
      - coursehub_net
    depends_on:
      app: { condition: service_started }

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - coursehub_net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    ports:
      - "33062:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - coursehub_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - coursehub_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

networks:
  coursehub_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
